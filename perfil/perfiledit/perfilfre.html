<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Quebragalho</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../base/base.css">
    <link rel="stylesheet" href="perfilfree.css">
</head>
<body>

    <div id="overlay" class="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-sidebar">Quebra<span>galho</span></div>
            <button class="btn-close" id="close-menu"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="../../home/home.html"><i class="fa-solid fa-house"></i> Início</a></li>
                <li><a href="#"><i class="fa-solid fa-briefcase"></i> Minhas Vagas</a></li>
                <li><a href="#"><i class="fa-solid fa-bell"></i> Notificações</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <a href="../index/index.html" class="logout-link"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sair</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="main-header">
            <button class="btn-menu" id="open-menu">
                <i class="fa-solid fa-bars-staggered"></i>
            </button>
        </header>

        <section class="profile-layout">
            
            <aside class="profile-aside">
                <div class="photo-card">
                    <div class="photo-wrapper">
                        <img src="../../img/Icon.jpg" alt="Foto de Perfil" id="display-photo">
                        <button class="change-photo-btn"><i class="fa-solid fa-camera"></i></button>
                    </div>
                    <h2 id="display-name-aside">Rafaella Gomes</h2>
                    <p id="display-role-aside">...</p>
                    <span class="status-badge">Disponível</span>
                </div>

                <div class="stats-mini-card">
                    <div class="stat-box"><strong>0</strong><span>Frees</span></div>
                    <div class="stat-box"><strong>0.0</strong><span>Nota</span></div>
                </div>
            </aside>

            <div class="profile-main-data">
                
                <div class="info-card">
                    <div class="card-header">
                        <h3><i class="fa-solid fa-id-card"></i> Informações</h3>
                        <button class="edit-trigger" id="edit-btn">Editar Perfil</button>
                    </div>
                    
                    <div class="info-grid" id="info-form">
                        <div class="info-item">
                            <label>Nome Completo</label>
                            <p class="view-mode" id="p-nome">Rafaella Gomes</p>
                        </div>
                        <div class="info-item">
                            <label>Profissão</label>
                            <p class="view-mode" id="p-profissao">...</p>
                        </div>
                        <div class="info-item">
                            <label>E-mail</label>
                            <p class="view-mode" id="p-email">rafaella@email.com</p>
                        </div>
                    </div>
                </div>

                <div class="info-card">
                    <div class="card-header">
                        <h3><i class="fa-solid fa-quote-left"></i> Biografia</h3>
                    </div>
                    <div id="bio-area">
                        <p class="bio-text view-mode" id="p-bio">
                            ...
                        </p>
                    </div>
                </div>

                <div class="action-footer" id="save-area" style="display: none;">
                    <button class="btn-cancel" onclick="location.reload()">Cancelar</button>
                    <button class="btn-save" id="save-btn">Salvar Alterações</button>
                </div>

            </div>
        </section>
    </main>

    <script src="perfilfree.js"></script>
</body>
</html>
