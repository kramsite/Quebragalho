<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Empresa - Quebragalho</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../base/base.css">
    <link rel="stylesheet" href="formularios.css">
</head>
<body class="login-page">

    <div id="toast" class="toast">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="toast-message">Preencha todos os campos!</span>
    </div>

    <main class="login-container">
        <h1 class="brand-name">Quebra<span>galho</span></h1>

        <div class="login-box">
            <form id="multi-step-form">
                
                <div class="form-step active" id="step-1">
                    <h2 style="color: white; margin-bottom: 20px;">Dados da Empresa</h2>
                    <div class="input-group">
                        <label>Razão Social</label>
                        <input type="text" id="razao-social" placeholder="Nome legal da empresa" required>
                    </div>
                    <div class="input-group">
                        <label>Nome Fantasia</label>
                        <input type="text" id="nome-fantasia" placeholder="Como a empresa é conhecida" required>
                    </div>
                    <div class="input-group">
                        <label>CNPJ</label>
                        <input type="text" id="cnpj" placeholder="00.000.000/0000-00" maxlength="18" required>
                    </div>
                    <div class="input-group">
                        <label>Setor de Atuação</label>
                        <input type="text" id="setor" placeholder="Ex: Construção Civil, TI, Eventos" required>
                    </div>
                    <button type="button" class="btn-login" onclick="nextStep(2)">Próximo</button>
                </div>

                <div class="form-step" id="step-2" style="display: none;">
                    <h2 style="color: white; margin-bottom: 20px;">Contato e Local</h2>
                    <div style="display: flex; gap: 10px;">
                        <div class="input-group" style="flex: 2;">
                            <label>Nome do Responsável</label>
                            <input type="text" id="responsavel" placeholder="Nome do recrutador" required>
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label>Cargo</label>
                            <input type="text" id="cargo" placeholder="Ex: RH" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>E-mail Corporativo</label>
                        <input type="email" id="email" placeholder="empresa@contato.com" required>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <div class="input-group" style="flex: 1;">
                            <label>CEP</label>
                            <input type="text" id="cep" placeholder="00000-000" maxlength="9" required>
                        </div>
                        <div class="input-group" style="flex: 2;">
                            <label>Endereço Comercial</label>
                            <input type="text" id="endereco" placeholder="Rua, número..." required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Cidade e Estado</label>
                        <input type="text" id="cidade-estado" placeholder="Ex: Cuiabá - MT" required>
                    </div>
                    
                    <div class="btn-container" style="display: flex; gap: 10px;">
                        <button type="button" class="btn-login" style="background-color: rgba(255,255,255,0.2);" onclick="nextStep(1)">Voltar</button>
                        <button type="button" class="btn-login" onclick="nextStep(3)">Próximo</button>
                    </div>
                </div>

                <div class="form-step" id="step-3" style="display: none;">
                    <h2 style="color: white; margin-bottom: 20px;">Segurança</h2>
                    <div class="input-group">
                        <label>Senha de Acesso</label>
                        <div class="password-wrapper" style="position: relative;">
                            <input type="password" id="senha" placeholder="••••••••" required>
                            <i class="fa-solid fa-eye" onclick="togglePassword('senha', this)" 
                               style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666;"></i>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Confirmar Senha</label>
                        <div class="password-wrapper" style="position: relative;">
                            <input type="password" id="confirma-senha" placeholder="••••••••" required>
                            <i class="fa-solid fa-eye" onclick="togglePassword('confirma-senha', this)" 
                               style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666;"></i>
                        </div>
                    </div>
                    <div class="btn-container" style="display: flex; gap: 10px;">
                        <button type="button" class="btn-login" style="background-color: rgba(255,255,255,0.2);" onclick="nextStep(2)">Voltar</button>
                        <button type="submit" class="btn-login">Finalizar Cadastro</button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <script src="cadastro_empresa.js"></script>
</body>
</html>
