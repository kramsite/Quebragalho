<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro PF - Quebragalho</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../base/base.css">
    <link rel="stylesheet" href="formularios.css">
</head>
<body class="login-page">

    <main class="login-container">
        <h1 class="brand-name">Quebra<span>galho</span></h1>

        <div class="login-box">
            <form id="multi-step-form">
                
                <div class="form-step active" id="step-1">
                    <h2 style="color: white; margin-bottom: 20px;">Dados Pessoais</h2>
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="nome" placeholder="Seu nome" required>
                    </div>
                    <div class="input-group">
                        <label>CPF</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>
                    <button type="button" class="btn-login" onclick="nextStep(2)">Próximo</button>
                </div>

                <div class="form-step" id="step-2" style="display: none;">
                    <h2 style="color: white; margin-bottom: 20px;">Segurança</h2>
                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" id="senha" placeholder="••••••••" required>
                    </div>
                    <div class="input-group">
                        <label>Confirmar Senha</label>
                        <input type="password" id="confirma-senha" placeholder="••••••••" required>
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <button type="button" class="btn-login" style="background-color: var(--dark-grey);" onclick="nextStep(1)">Voltar</button>
                        <button type="submit" class="btn-login">Finalizar</button>
                    </div>
                </div>

            </form>
            
            <div class="login-footer" style="margin-top: 20px;">
                <a href="../index/index.html" style="color: white; text-decoration: none;">Sair do cadastro</a>
            </div>
        </div>
    </main>

    <script src="../base/base.js"></script>
    <script>
        function nextStep(step) {
            // Esconde todos os passos
            document.querySelectorAll('.form-step').forEach(el => {
                el.style.display = 'none';
            });

            // Mostra o passo desejado
            document.getElementById('step-' + step).style.display = 'block';
        }

        // Lógica final de envio
        document.getElementById('multi-step-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const senha = document.getElementById('senha').value;
            const confirma = document.getElementById('confirma-senha').value;

            if (senha !== confirma) {
                alert("As senhas não coincidem!");
                return;
            }

            alert("Cadastro realizado com sucesso!");
            window.location.href = "../index/index.html"; // Volta para o login
        });
    </script>
</body>
</html>
