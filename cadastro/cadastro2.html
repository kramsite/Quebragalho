<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro PF - Quebragalho</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../base/base.css">
    <link rel="stylesheet" href="formularios.css">
</head>
<body class="login-page">

    <div id="toast" class="toast">
    <i class="fa-solid fa-circle-exclamation"></i>
    <span id="toast-message">Preencha todos os campos!</span>
</div>

    <main class="login-container">
        <h1 class="brand-name">Quebra<span>galho</span></h1>

        <div class="login-box">
            <form id="multi-step-form">
                
                <div class="form-step active" id="step-1">
                    <h2 style="color: white; margin-bottom: 20px;">Dados Pessoais</h2>
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="nome" placeholder="Seu nome" required>
                    </div>
                    <div class="input-group">
                        <label>CPF</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>
                    <button type="button" class="btn-login" onclick="nextStep(2)">Próximo</button>
                </div>

                <div class="form-step" id="step-2" style="display: none;">
                    <h2 style="color: white; margin-bottom: 20px;">Segurança</h2>
                    <div class="input-group">
                        <label>Senha</label>
                        <div class="password-wrapper" style="position: relative;">
                            <input type="password" id="senha" placeholder="••••••••" required>
                            <i class="fa-solid fa-eye" id="toggleSenha" onclick="togglePassword('senha', this)" 
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666;"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Confirmar Senha</label>
                        <div class="password-wrapper" style="position: relative;">
                            <input type="password" id="confirma-senha" placeholder="••••••••" required>
                            <i class="fa-solid fa-eye" id="toggleConfirma" onclick="togglePassword('confirma-senha', this)" 
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666;"></i>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <button type="button" class="btn-login" style="background-color: var(--dark-grey);" onclick="nextStep(1)">Voltar</button>
                        <button type="submit" class="btn-login">Finalizar</button>
                    </div>
                </div>

            </form>
            
            <div class="login-footer" style="margin-top: 20px;">
                <a href="../index/index.html" style="color: white; text-decoration: none;">Sair do cadastro</a>
            </div>
        </div>
    </main>

    <script src="../base/base.js"></script>
    <script src="cadastro_fisica.js"></script>
</body>
</html>
