<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro PF - Quebragalho</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../base/base.css">
    <link rel="stylesheet" href="formularios.css">
</head>
<body class="login-page">

    <div id="toast" class="toast">
    <i class="fa-solid fa-circle-exclamation"></i>
    <span id="toast-message">Preencha todos os campos!</span>
</div>

    <main class="login-container">
        <h1 class="brand-name">Quebra<span>galho</span></h1>

        <div class="login-box">
            <form id="multi-step-form">
                
                <div class="form-step active" id="step-1">
                    <h2 style="color: white; margin-bottom: 20px;">Dados Pessoais</h2>
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="nome" placeholder="Seu nome" required>
                    </div>
                    <div class="input-group">
                        <label>CPF</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>
                    <button type="button" class="btn-login" onclick="nextStep(2)">Próximo</button>
                </div>

                <div class="form-step" id="step-2" style="display: none;">
                    <h2 style="color: white; margin-bottom: 20px;">Segurança</h2>
                    <div class="input-group">
                        <label>Senha</label>
                        <div class="password-wrapper" style="position: relative;">
                            <input type="password" id="senha" placeholder="••••••••" required>
                            <i class="fa-solid fa-eye" id="toggleSenha" onclick="togglePassword('senha', this)" 
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666;"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Confirmar Senha</label>
                        <div class="password-wrapper" style="position: relative;">
                            <input type="password" id="confirma-senha" placeholder="••••••••" required>
                            <i class="fa-solid fa-eye" id="toggleConfirma" onclick="togglePassword('confirma-senha', this)" 
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666;"></i>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <button type="button" class="btn-login" style="background-color: var(--dark-grey);" onclick="nextStep(1)">Voltar</button>
                        <button type="submit" class="btn-login">Finalizar</button>
                    </div>
                </div>

            </form>
            
            <div class="login-footer" style="margin-top: 20px;">
                <a href="../index/index.html" style="color: white; text-decoration: none;">Sair do cadastro</a>
            </div>
        </div>
    </main>

    <script src="../base/base.js"></script>
    <script>
        /* ================================================================
   LÓGICA DE CADASTRO - QUEBRAGALHO
   ================================================================
*/

/**
 * Exibe uma notificação elegante (Toast) no topo da tela
 * @param {string} mensagem - O texto que será exibido
 */
function showToast(mensagem) {
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toast-message');
    
    if (!toast || !toastMsg) return; // Segurança caso o HTML não tenha o elemento

    toastMsg.innerText = mensagem;
    toast.classList.add('show');

    // Remove a mensagem após 3 segundos
    setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}

/**
 * Controla a transição entre os passos do formulário com validação
 * @param {number} step - O número do passo para onde o usuário deseja ir
 */
function nextStep(step) {
    // Validação: Só valida se o usuário estiver tentando ir para o Passo 2
    if (step === 2) {
        const nome = document.getElementById('nome').value.trim();
        const cpf = document.getElementById('cpf').value.trim();
        const email = document.getElementById('email').value.trim();

        // Verifica se algum campo está vazio
        if (nome === "" || cpf === "" || email === "") {
            showToast("Ops! Preencha todos os campos para continuar.");
            return;
        }
        
        // Validação simples de e-mail
        if (!email.includes("@") || !email.includes(".")) {
            showToast("Por favor, insira um e-mail válido.");
            return;
        }
    }

    // Se passou na validação ou se for o botão 'Voltar', executa a troca de tela
    const steps = document.querySelectorAll('.form-step');
    
    steps.forEach(el => {
        el.style.display = 'none';
        el.classList.remove('active');
    });

    const nextStepEl = document.getElementById('step-' + step);
    if (nextStepEl) {
        nextStepEl.style.display = 'block';
        nextStepEl.classList.add('active');
    }
}

/**
 * Alterna a visibilidade da senha entre texto e pontos
 * @param {string} inputId - O ID do campo de input (senha ou confirma-senha)
 * @param {HTMLElement} icon - O elemento do ícone clicado (this)
 */
function togglePassword(inputId, icon) {
    const input = document.getElementById(inputId);
    
    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}

/**
 * Evento de envio final do formulário
 */
document.getElementById('multi-step-form').addEventListener('submit', function(e) {
    e.preventDefault(); // Impede o recarregamento da página

    const senha = document.getElementById('senha').value;
    const confirma = document.getElementById('confirma-senha').value;

    // Validação final de segurança
    if (senha.length < 6) {
        showToast("A senha deve ter pelo menos 6 caracteres.");
        return;
    }

    if (senha !== confirma) {
        showToast("As senhas não coincidem!");
        return;
    }

    // Sucesso!
    showToast("Cadastro realizado com sucesso!");
    
    // Pequeno atraso para o usuário ver o toast de sucesso antes de redirecionar
    setTimeout(() => {
        window.location.href = "../index/index.html";
    }, 1500);

    
});

// Seleciona o campo de CPF
const inputCPF = document.getElementById('cpf');

// Adiciona o evento de digitação
inputCPF.addEventListener('input', (e) => {
    let value = e.target.value;

    // Remove qualquer caractere que não seja número
    value = value.replace(/\D/g, "");

    // Aplica a formatação progressivamente
    if (value.length > 3) {
        value = value.replace(/^(\d{3})(\d)/, "$1.$2");
    }
    if (value.length > 6) {
        value = value.replace(/^(\d{3})\.(\d{3})(\d)/, "$1.$2.$3");
    }
    if (value.length > 9) {
        value = value.replace(/^(\d{3})\.(\d{3})\.(\d{3})(\d)/, "$1.$2.$3-$4");
    }

    // Limita a 14 caracteres (000.000.000-00)
    e.target.value = value.substring(0, 14);
});
    </script>
</body>
</html>
