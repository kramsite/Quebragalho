<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quebragalho</title>
    <link rel="stylesheet" href="/base/base.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Quebragalho</h3>
            <button id="close-menu" class="btn-close">&times;</button>
        </div>
        <ul>
            <li><a href="#">Entrar</a></li>
            <li><a href="#">Criar Conta</a></li>
            <li><a href="#">Sobre nós</a></li>
        </ul>
    </nav>
    <div id="overlay" class="overlay"></div>

    <header class="main-header">
        <button id="open-menu" class="btn-menu">
            <span></span><span></span><span></span>
        </button>
        <div class="logo">Quebra<span>galho</span></div>
    </header>

    <main class="login-container">
        <div class="login-box">
            <h2>Bem-vindo!</h2>
            <p>Acesse sua conta para continuar</p>
            
            <form id="form-login">
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" placeholder="seu@email.com" required>
                </div>
                
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-login">Entrar</button>
                
                <div class="login-footer">
                    <a href="#">Esqueceu a senha?</a>
                    <p>Não tem conta? <a href="#" class="link-destaque">Cadastre-se</a></p>
                </div>
            </form>
        </div>
    </main>

    <script src="/base/base.js"></script>
</body>
</html>
