<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quebragalho</title>
    <link rel="stylesheet" href="../base/base.css">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page"> <main class="login-container">
        <h1 class="brand-name">Quebra<span>galho</span></h1>

        <div class="login-box">
    
            <form id="form-login">
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" placeholder="exemplo@email.com" required>
                </div>
                
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-login">Acessar</button>
                
                <div class="login-footer">
                    <p>Não tem conta? <a href="../cadastro/cadastro1.html" class="link-destaque">Cadastre-se</a></p>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
