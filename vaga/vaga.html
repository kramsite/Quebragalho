<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Oportunidade - Quebragalho</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../base/base.css">
    <link rel="stylesheet" href="vaga.css">
</head>
<body>

    <div id="overlay" class="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">Quebra<span>galho</span></div>
            <button class="btn-close" id="close-menu">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <nav class="sidebar-nav">
            <ul>
                <li><a href="../home/home.html"><i class="fa-solid fa-house"></i> Início</a></li>
                <li><a href="#" class="active"><i class="fa-solid fa-briefcase"></i> Suas vagas</a></li>
                <li><a href="../perfil/perfiledit/perfilfre.html"><i class="fa-solid fa-user"></i> Perfil</a></li>
                <li><a href="#"><i class="fa-solid fa-bell"></i> Notificações</a></li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <a href="../index/index.html" class="logout-link">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Sair
            </a>
        </div>
    </aside>

    <main class="main-content">

        <header class="main-header">
            <button class="btn-menu" id="open-menu">
                <i class="fa-solid fa-bars-staggered"></i>
            </button>

            <div class="search-container">
                <div class="search-bar page-title-bar">
                    <i class="fa-solid fa-bullhorn"></i>
                    <span>Publicar oportunidade</span>
                </div>
            </div>

            <div class="user-info">
                <img src="../img/Icon.jpg" alt="Perfil" class="profile-pic">
            </div>
        </header>


            <div class="form-card">
                <h1 class="form-title">📢 Publicar Oportunidade</h1>
                <p class="form-subtitle">Busque um freelancer ou ofereça seus serviços</p>

                <div class="opportunity-type">
                    <div class="type-btn selected" data-type="job" onclick="selectType('job')">
                        <div class="emoji">🏢</div>
                        <div class="title">Estou contratando</div>
                        <div class="desc">Procuro freelancers para um projeto</div>
                    </div>

                    <div class="type-btn" data-type="service" onclick="selectType('service')">
                        <div class="emoji">💼</div>
                        <div class="title">Ofereço serviços</div>
                        <div class="desc">Quero oferecer meu trabalho</div>
                    </div>
                </div>

                <form id="opportunityForm">
                    <input type="hidden" id="opportunityType" value="job">

                    <div class="form-group">
                        <label id="titleLabel">Título da Vaga *</label>
                        <input type="text" id="title" required placeholder="Ex: Desenvolvedor React Sênior">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Categoria *</label>
                            <select id="category" required>
                                <option value="">Selecione</option>
                                <option value="Desenvolvimento Web">🌐 Desenvolvimento Web</option>
                                <option value="Design">🎨 Design</option>
                                <option value="Marketing">📢 Marketing</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label id="valueLabel">Valor *</label>
                            <input type="text" id="value" required placeholder="Ex: R$ 5.000">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label id="deadlineLabel">Prazo / Duração *</label>
                            <input type="text" id="deadline" required placeholder="Ex: 30 dias">
                        </div>

                        <div class="form-group">
                            <label>Modalidade</label>
                            <select id="modality">
                                <option value="Remoto">🏠 Remoto</option>
                                <option value="Híbrido">🔄 Híbrido</option>
                                <option value="Presencial">🏢 Presencial</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label id="descriptionLabel">Descrição *</label>
                        <textarea id="description" rows="5" required placeholder="Descreva os detalhes..."></textarea>
                    </div>

                    <div class="form-group" id="benefitsGroup">
                        <label>Benefícios / Observações</label>
                        <input type="text" id="benefits" placeholder="Ex: Home office, bônus por entrega">
                    </div>

                    <div class="form-group">
                        <label>Habilidades Necessárias</label>
                        <input type="text" id="skillInput" placeholder="Digite e pressione Enter">
                        <div class="skills-input" id="skillsList"></div>
                    </div>

                    <button type="submit" class="btn-submit">Publicar Oportunidade</button>
                </form>
            </div>
        </section>

    </main>

    <script src="vaga.js"></script>
</body>
</html>
