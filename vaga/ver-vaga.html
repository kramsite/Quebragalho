<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Oportunidades - Quebragalho</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
        }

        .header {
            background: linear-gradient(135deg, #ff6b00, #ff8c00);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .brand-name {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .brand-name span {
            color: #ffd700;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: white;
            color: #ff6b00;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        .page-title {
            margin-bottom: 30px;
        }

        .opportunities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .opportunity-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            position: relative;
        }

        .card-header {
            padding: 20px;
            color: white;
        }

        .card-header.job {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card-header.service {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .status-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .status-badge.open {
            background: #4CAF50;
            color: white;
        }

        .status-badge.closed {
            background: #f44336;
            color: white;
        }

        .card-body {
            padding: 20px;
        }

        .title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .info-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0;
            font-size: 0.85rem;
            color: #666;
        }

        .applications-count {
            background: #ff6b00;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
            margin: 10px 0;
            font-size: 0.8rem;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-toggle, .btn-delete {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-toggle {
            background: #ff9800;
            color: white;
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 80px;
            background: white;
            border-radius: 20px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            .opportunities-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="brand-name">Quebra<span>galho</span></h1>
        <div class="user-info">
            <span id="userName">Carregando...</span>
            <div class="user-avatar" id="userAvatar">U</div>
        </div>
    </div>

    <div class="container">
        <div class="page-title">
            <h1>📋 Minhas Oportunidades</h1>
            <p>Gerencie as vagas e serviços que você publicou</p>
        </div>

        <div class="opportunities-grid" id="opportunitiesGrid"></div>
    </div>

    <script>
        let myOpportunities = [];
        let currentUser = null;
        let currentUserType = null;

        function loadUserData() {
            const companyData = localStorage.getItem('companyProfile');
            const freelancerData = localStorage.getItem('freelancerProfile');
            
            if (companyData) {
                currentUser = JSON.parse(companyData);
                currentUserType = 'company';
                document.getElementById('userName').textContent = currentUser.companyName?.split(' ')[0] || 'Empresa';
                document.getElementById('userAvatar').textContent = currentUser.logo || 'E';
            } else if (freelancerData) {
                currentUser = JSON.parse(freelancerData);
                currentUserType = 'freelancer';
                document.getElementById('userName').textContent = currentUser.fullName?.split(' ')[0] || 'Freelancer';
                document.getElementById('userAvatar').textContent = currentUser.avatar || 'F';
            }
        }

        function loadMyOpportunities() {
            const allOpp = JSON.parse(localStorage.getItem('allOpportunities') || '[]');
            myOpportunities = allOpp.filter(opp => opp.postedBy === currentUserType);
            renderOpportunities();
        }

        function renderOpportunities() {
            const grid = document.getElementById('opportunitiesGrid');
            
            if (myOpportunities.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>Você ainda não publicou nada</h3>
                        <p>Clique no botão "Publicar" para começar</p>
                        <button onclick="window.location.href='post-opportunity.html'" style="margin-top: 20px; background: #ff6b00; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">➕ Publicar Oportunidade</button>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = myOpportunities.map(opp => `
                <div class="opportunity-card">
                    <div class="card-header ${opp.type === 'job' ? 'job' : 'service'}">
                        <div class="type-badge" style="position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem;">
                            ${opp.type === 'job' ? '🏢 Vaga' : '💼 Serviço'}
                        </div>
                        <div class="status-badge ${opp.status === 'open' ? 'open' : 'closed'}">
                            ${opp.status === 'open' ? '📢 Aberta' : '🔒 Fechada'}
                        </div>
                        <div style="margin-top: 30px;"></div>
                        <div class="posted-by">
                            <div class="posted-avatar" style="display: inline-block; width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.3); display: inline-flex; align-items: center; justify-content: center;">${opp.postedByAvatar}</div>
                            <span>${opp.postedByName}</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="title">${opp.title}</div>
                        <div class="info-row">
                            <span>📂 ${opp.category}</span>
                            <span>💰 ${opp.value}</span>
                            <span>⏰ ${opp.deadline}</span>
                        </div>
                        <div class="applications-count">👥 ${opp.applications?.length || 0} interessados</div>
                        <div class="card-actions">
                            <button class="btn-toggle" onclick="toggleStatus('${opp.id}')">${opp.status === 'open' ? '🔒 Fechar' : '📢 Abrir'}</button>
                            <button class="btn-delete" onclick="deleteOpportunity('${opp.id}')">🗑️ Excluir</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleStatus(id) {
            const allOpp = JSON.parse(localStorage.getItem('allOpportunities') || '[]');
            const opp = allOpp.find(o => o.id === id);
            if (opp) {
                opp.status = opp.status === 'open' ? 'closed' : 'open';
                localStorage.setItem('allOpportunities', JSON.stringify(allOpp));
                loadMyOpportunities();
                showToast(opp.status === 'open' ? '✅ Oportunidade reaberta!' : '🔒 Oportunidade fechada!');
            }
        }

        function deleteOpportunity(id) {
            if (confirm('Tem certeza que deseja excluir esta oportunidade?')) {
                let allOpp = JSON.parse(localStorage.getItem('allOpportunities') || '[]');
                allOpp = allOpp.filter(o => o.id !== id);
                localStorage.setItem('allOpportunities', JSON.stringify(allOpp));
                loadMyOpportunities();
                showToast('🗑️ Oportunidade excluída!');
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        loadUserData();
        loadMyOpportunities();
    </script>

    <script src="/dado.js"></script>
</body>
</html>
